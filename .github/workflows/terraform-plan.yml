name: Terraform Security & Plan

on:
  pull_request:
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-plan.yml'
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-plan.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  terraform-checks:
    name: Terraform Security and Validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/envs/dev
    env:
      TF_VAR_alert_email: ci@example.com
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Terraform Format
        id: fmt
        run: terraform fmt -check -recursive ../../

      - name: Terraform Init
        id: init
        run: terraform init -backend=false

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Run Checkov Security Scan
        working-directory: ${{ github.workspace }}
        run: |
          python -m pip install --upgrade pip
          pip install checkov==3.2.529
          checkov -d terraform/ \
            --framework terraform \
            --skip-path terraform/envs/dev/.terraform \
            --skip-check CKV_AWS_18,CKV_AWS_109,CKV_AWS_111,CKV_AWS_144,CKV_AWS_274,CKV_AWS_356,CKV_TF_1,CKV_TF_2,CKV2_AWS_56,CKV2_AWS_62,CKV2_AWS_64 \
            --output cli \
            --output sarif \
            --output-file-path console,results.sarif

      - name: Upload Checkov SARIF
        if: always() && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@78ed0c7291d93e40c51b085850dc669a4c3ab73b # v3
        with:
          sarif_file: results.sarif
          category: checkov

  terraform-plan:
    name: Terraform Remote Plan
    runs-on: ubuntu-latest
    needs: terraform-checks
    if: github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: terraform/envs/dev
    env:
      AWS_REGION: us-east-1
      TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/aws-eks-secure-delivery-detection-lab-dev-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Write Backend Config
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          cat > backend.hcl <<EOF
          bucket         = "eks-sec-delivery-dev-tfstate-${ACCOUNT_ID}"
          key            = "dev/terraform.tfstate"
          region         = "${AWS_REGION}"
          dynamodb_table = "aws-eks-secure-delivery-detection-lab-dev-tf-locks"
          encrypt        = true
          EOF

      - name: Terraform Init
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color

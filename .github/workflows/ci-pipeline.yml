name: CI Security Pipeline

on:
  pull_request:
    paths:
      - 'app/**'
      - 'kubernetes/**'
      - 'policies/**'
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'kubernetes/**'
      - 'policies/**'

permissions:
  contents: read
  security-events: write

jobs:
  test-and-scan:
    name: App Tests and Container Scans
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          
      - name: Run Pytest
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install -r lambda/guardduty_finding_router/requirements.txt
          pip install pytest httpx
          pytest app/tests lambda/guardduty_finding_router/tests

      - name: Trivy Filesystem Scan (Secrets and Misconfigs)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy FS SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@78ed0c7291d93e40c51b085850dc669a4c3ab73b # v3
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: trivy-fs

      - name: Build Docker Image
        run: docker build -t secure-demo-api:${{ github.sha }} app/

      - name: Trivy Image Scan (Vulnerabilities)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: 'secure-demo-api:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload Trivy Image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@78ed0c7291d93e40c51b085850dc669a4c3ab73b # v3
        with:
          sarif_file: 'trivy-image-results.sarif'
          category: trivy-image

      - name: Install Kyverno CLI
        run: |
          curl -LO https://github.com/kyverno/kyverno/releases/download/v1.17.1/kyverno-cli_v1.17.1_linux_x86_64.tar.gz
          tar -xvf kyverno-cli_v1.17.1_linux_x86_64.tar.gz
          sudo mv kyverno /usr/local/bin/

      - name: Kyverno Manifest Scan
        run: |
          kyverno apply policies/kyverno --resource kubernetes/namespace.yaml
          kyverno apply policies/kyverno --resource kubernetes/service-account.yaml
          kyverno apply policies/kyverno --resource kubernetes/deployment.yaml
          kyverno apply policies/kyverno --resource kubernetes/service.yaml
          kyverno apply policies/kyverno --resource kubernetes/network-policy.yaml

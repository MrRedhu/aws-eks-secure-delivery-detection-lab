name: Destroy Dev

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/destroy-dev.yml'
  workflow_dispatch:
    inputs:
      confirm:
        description: Type destroy-dev to confirm
        required: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_DIR: terraform/envs/dev
  TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

jobs:
  validate:
    name: Validate Destroy Workflow
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Terraform Format
        working-directory: terraform/envs/dev
        run: terraform fmt -check -recursive ../../

  destroy:
    name: Destroy Dev Infrastructure
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'destroy-dev'

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/aws-eks-secure-delivery-detection-lab-dev-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Write Backend Config
        working-directory: ${{ env.TF_DIR }}
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          cat > backend.hcl <<EOF
          bucket         = "eks-sec-delivery-dev-tfstate-${ACCOUNT_ID}"
          key            = "dev/terraform.tfstate"
          region         = "${AWS_REGION}"
          dynamodb_table = "aws-eks-secure-delivery-detection-lab-dev-tf-locks"
          encrypt        = true
          EOF

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Destroy
        working-directory: ${{ env.TF_DIR }}
        run: terraform destroy -auto-approve

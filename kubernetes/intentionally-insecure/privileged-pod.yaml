apiVersion: v1
kind: Pod
metadata:
  name: privileged-demo
  namespace: secure-demo
spec:
  containers:
    - name: privileged
      image: 000000000000.dkr.ecr.us-east-1.amazonaws.com/aws-eks-secure-delivery-detection-lab-dev-api:placeholder
      securityContext:
        privileged: true
        allowPrivilegeEscalation: true
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
